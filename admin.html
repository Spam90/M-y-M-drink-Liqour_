<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | M&M Drink Liquor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#D4AF37', 500: '#C4A030', 600: '#B4942C' },
                        dark: { 700: '#111111', 800: '#0D0D0D', 900: '#0A0A0A' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0A0A0A; font-family: 'DM Sans', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: #D4AF37 !important; outline: none; }
    </style>
</head>
<body class="pb-20 overflow-hidden" id="adminBody">

    <!-- Overlay de Seguridad -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] bg-dark-900 flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="glass max-w-md w-full p-8 rounded-3xl text-center shadow-2xl border-gold-400/20">
            <div class="w-16 h-16 bg-gold-400 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-gold-400/20">
                <i class="fas fa-lock text-black text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Acceso Restringido</h2>
            <p class="text-gray-400 text-sm mb-6">Ingresa la clave de administrador para gestionar el catálogo.</p>
            <div class="space-y-4">
                <input type="password" id="adminPass" 
                    class="w-full p-4 rounded-xl text-center text-lg tracking-widest border-white/10" 
                    placeholder="••••••••"
                    onkeypress="if(event.key === 'Enter') checkAccess()">
                <button onclick="checkAccess()" class="w-full bg-gold-400 text-black font-bold py-4 rounded-xl hover:bg-gold-500 transition-all shadow-lg shadow-gold-400/10">
                    Entrar al Panel
                </button>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-gold-400/20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gold-400 rounded-lg flex items-center justify-center">
                <i class="fas fa-tools text-black"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">M&M <span class="text-gold-400">Admin</span></h1>
        </div>
        <div class="flex gap-4">
            <button onclick="exportJSON()" class="bg-gold-400 hover:bg-gold-500 text-black px-4 py-2 rounded-lg font-bold transition-all text-sm">
                <i class="fas fa-download mr-2"></i>Exportar JSON
            </button>
            <a href="index.html" class="glass px-4 py-2 rounded-lg text-sm hover:bg-white/5 transition-all">Ver Tienda</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Formulario de Edición/Alta -->
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-24">
                    <h2 id="formTitle" class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-gold-400"></i> Nuevo Producto
                    </h2>
                    <form id="productForm" class="space-y-4">
                        <input type="hidden" id="prodId">
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold mb-1 block">Nombre del Producto</label>
                            <input type="text" id="prodNombre" required class="w-full p-3 rounded-xl text-sm" placeholder="Ej: Brugal Leyenda 750ml">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-gray-400 uppercase font-bold mb-1 block">Precio (RD$)</label>
                                <input type="number" id="prodPrecio" required class="w-full p-3 rounded-xl text-sm" placeholder="0.00">
                            </div>
                            <div>
                                <label class="text-xs text-gray-400 uppercase font-bold mb-1 block">Categoría</label>
                                <select id="prodCategoria" class="w-full p-3 rounded-xl text-sm">
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 uppercase font-bold mb-1 block">URL Imagen</label>
                            <input type="text" id="prodImagen" class="w-full p-3 rounded-xl text-sm" placeholder="assets/img/productos/imagen.png">
                        </div>
                        <div class="flex gap-6 py-2">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="prodDisponible" checked class="w-4 h-4 rounded border-gray-300 text-gold-400 focus:ring-gold-400">
                                <span class="text-sm">Disponible</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="prodOferta" class="w-4 h-4 rounded border-gray-300 text-gold-400 focus:ring-gold-400">
                                <span class="text-sm text-red-400 font-bold">Oferta</span>
                            </label>
                        </div>
                        <div class="pt-4 flex gap-2">
                            <button type="submit" class="flex-1 bg-white text-black font-bold py-3 rounded-xl hover:bg-gold-400 transition-all">Guardar</button>
                            <button type="button" onclick="resetForm()" class="px-4 bg-dark-700 rounded-xl hover:bg-red-500/20 text-gray-400 hover:text-red-400 transition-all border border-white/5">
                                <i class="fas fa-undo"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Tabla de Productos -->
            <div class="lg:col-span-2">
                <div class="glass rounded-3xl overflow-hidden">
                    <div class="p-6 border-b border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <h2 class="text-xl font-bold">Inventario (<span id="count">0</span>)</h2>
                        <div class="relative w-full sm:w-64">
                            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                            <input type="text" id="adminSearch" oninput="renderTable()" placeholder="Buscar..." class="w-full pl-10 pr-4 py-2 rounded-full text-xs">
                        </div>
                    </div>
                    <div class="overflow-x-auto custom-scroll">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-white/5 text-gray-400 uppercase text-[10px] font-bold">
                                <tr>
                                    <th class="px-6 py-4">Producto</th>
                                    <th class="px-6 py-4">Categoría</th>
                                    <th class="px-6 py-4">Precio</th>
                                    <th class="px-6 py-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="adminTableBody" class="divide-y divide-white/5">
                                <!-- JS render -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let products = [];
        const form = document.getElementById('productForm');

        function checkAccess() {
            const pass = document.getElementById('adminPass').value;
            // CLAVE DE ACCESO (Cámbiala aquí por la que desees)
            if (pass === 'admin123') {
                sessionStorage.setItem('adminAuth', 'true');
                unlockPanel();
            } else {
                alert('Clave incorrecta');
                document.getElementById('adminPass').value = '';
            }
        }

        function unlockPanel() {
            const overlay = document.getElementById('loginOverlay');
            if (overlay) overlay.remove();
            const body = document.getElementById('adminBody');
            if (body) body.classList.remove('overflow-hidden');
        }

        async function init() {
            if (sessionStorage.getItem('adminAuth') === 'true') unlockPanel();

            try {
                const res = await fetch('data/products.json');
                products = await res.json();
                updateCategoryOptions();
                renderTable();
            } catch (e) {
                console.error("Error cargando productos", e);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('adminTableBody');
            const query = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = products.filter(p => String(p.nombre || '').toLowerCase().includes(query));
            
            document.getElementById('count').textContent = filtered.length;

            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-white/[0.02] transition-colors group">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-dark-800 flex-shrink-0 border border-white/5 overflow-hidden">
                                <img src="${p.imagen || 'https://placehold.co/100?text=Sin+Imagen'}" class="w-full h-full object-contain p-1" onerror="this.src='https://placehold.co/100?text=Error'">
                            </div>
                            <div>
                                <div class="font-bold text-white line-clamp-1">${p.nombre}</div>
                                <div class="text-[10px] flex gap-2 mt-1">
                                    ${p.disponible ? '<span class="text-green-500">En Stock</span>' : '<span class="text-red-500">Agotado</span>'}
                                    ${p.es_oferta ? '<span class="bg-red-500/20 text-red-400 px-1 rounded">OFERTA</span>' : ''}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-gray-400">${p.categoria}</td>
                    <td class="px-6 py-4 font-bold text-gold-400">RD$ ${p.precio.toLocaleString()}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="editProduct(${p.id})" class="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white transition-all">
                                <i class="fas fa-edit text-xs"></i>
                            </button>
                            <button onclick="deleteProduct(${p.id})" class="w-8 h-8 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all">
                                <i class="fas fa-trash text-xs"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateCategoryOptions() {
            const select = document.getElementById('prodCategoria');
            const categories = [...new Set(products.map(p => p.categoria))].filter(Boolean).sort();
            const currentVal = select.value;
            
            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('') + 
                               '<option value="Otros">Otros</option>';
            
            if (categories.includes(currentVal)) select.value = currentVal;
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('prodId').value;
            const productData = {
                id: id ? parseInt(id) : Date.now(),
                nombre: document.getElementById('prodNombre').value,
                precio: parseFloat(document.getElementById('prodPrecio').value),
                categoria: document.getElementById('prodCategoria').value,
                imagen: document.getElementById('prodImagen').value || '',
                disponible: document.getElementById('prodDisponible').checked,
                es_oferta: document.getElementById('prodOferta').checked
            };

            if (id) {
                const index = products.findIndex(p => p.id === parseInt(id));
                products[index] = productData;
            } else {
                products.unshift(productData);
            }

            renderTable();
            resetForm();
            updateCategoryOptions();
            showToast(id ? "Producto actualizado" : "Producto creado");
        };

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (!p) return;

            document.getElementById('prodId').value = p.id;
            document.getElementById('prodNombre').value = p.nombre;
            document.getElementById('prodPrecio').value = p.precio;
            document.getElementById('prodCategoria').value = p.categoria;
            document.getElementById('prodImagen').value = p.imagen;
            document.getElementById('prodDisponible').checked = p.disponible;
            document.getElementById('prodOferta').checked = p.es_oferta;

            document.getElementById('formTitle').innerHTML = `<i class="fas fa-edit text-blue-400"></i> Editando Producto`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteProduct(id) {
            if (confirm('¿Seguro que quieres eliminar este producto?')) {
                products = products.filter(p => p.id !== id);
                renderTable();
                updateCategoryOptions();
                showToast("Producto eliminado", true);
            }
        }

        function resetForm() {
            form.reset();
            document.getElementById('prodId').value = '';
            document.getElementById('formTitle').innerHTML = `<i class="fas fa-plus-circle text-gold-400"></i> Nuevo Producto`;
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(products, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "products.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast("JSON generado para descarga");
        }

        function showToast(msg, isDanger = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold shadow-2xl z-50 transition-all ${isDanger ? 'bg-red-600' : 'bg-gold-400 text-black'}`;
            toast.innerHTML = `<i class="fas ${isDanger ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 2000);
        }

        init();
    </script>
</body>
</html>
